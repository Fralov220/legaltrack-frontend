<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LegalTrack — Veille Juridique</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Syne:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D0F0E;--bg2:#131614;--bg3:#1A1D1B;--bg4:#222622;
  --border:#2C312D;--border2:#3A403C;
  --ink:#F0EDE6;--ink2:#A8B0A4;--ink3:#6B7568;
  --gold:#C9A96E;--gold-dim:#3D3020;
  --green:#4CAF7D;--green-dim:#1A2E22;
  --blue:#5B8FD4;--blue-dim:#1A2340;
  --red:#E05252;--red-dim:#2E1A1A;
  --purple:#9B72CF;--purple-dim:#2A1E3D;
  --amber:#E09A3C;--amber-dim:#2E2210;
  --teal:#3CBFB4;--teal-dim:#0E2826;
  --r:10px;--r2:14px;
}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;font-size:14px;line-height:1.6;overflow-x:hidden}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* AUTH */
.auth-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:800;display:none;align-items:center;justify-content:center;padding:1rem}
.auth-overlay.open{display:flex}
.auth-box{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);padding:2rem;width:100%;max-width:380px}
.auth-logo{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:.25rem}
.auth-logo-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold)}
.auth-tagline{font-size:12px;color:var(--ink3);text-align:center;margin-bottom:1.5rem}
.auth-tabs{display:flex;gap:4px;background:var(--bg2);border-radius:var(--r);padding:3px;margin-bottom:1.25rem}
.auth-tab{flex:1;padding:7px;border-radius:8px;border:none;background:transparent;font-family:'Syne',sans-serif;font-size:12px;font-weight:500;color:var(--ink3);cursor:pointer;transition:all .15s}
.auth-tab.active{background:var(--bg3);color:var(--ink);border:1px solid var(--border)}
.auth-field{margin-bottom:.875rem}
.auth-label{display:block;font-size:10px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.auth-input{width:100%;padding:9px 12px;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;font-family:'Syne',sans-serif;font-size:13px;color:var(--ink);outline:none;transition:border-color .15s}
.auth-input:focus{border-color:var(--gold)}
.auth-input::placeholder{color:var(--ink3)}
.auth-btn{width:100%;padding:10px;background:var(--gold);color:#1A1200;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;margin-top:.25rem;transition:opacity .2s}
.auth-btn:hover{opacity:.85}
.auth-err{font-size:12px;color:var(--red);margin-top:.5rem;text-align:center;min-height:16px}
.auth-skip{font-size:12px;color:var(--ink3);text-align:center;margin-top:.875rem;cursor:pointer;transition:color .15s}
.auth-skip:hover{color:var(--ink2)}

/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;z-index:300;height:54px;background:rgba(13,15,14,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem;gap:1rem}
.logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:8px;white-space:nowrap;cursor:pointer}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold)}
.topbar-center{flex:1;max-width:460px;position:relative}
.search-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 12px 7px 34px;font-family:'Syne',sans-serif;font-size:13px;color:var(--ink);outline:none;transition:border-color .2s}
.search-input::placeholder{color:var(--ink3)}
.search-input:focus{border-color:var(--border2)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:13px;height:13px;stroke:var(--ink3);fill:none;stroke-width:2}
.topbar-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
.btn-top{padding:6px 13px;border-radius:7px;font-family:'Syne',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap;border:none}
.btn-login{background:var(--bg3);color:var(--ink2);border:1px solid var(--border)!important}
.btn-login:hover{color:var(--ink);border-color:var(--border2)!important}
.btn-nl{background:var(--gold);color:#1A1200;font-weight:600}
.btn-nl:hover{opacity:.85}
.btn-admin{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(155,114,207,.35)!important}
.user-badge{display:flex;align-items:center;gap:6px;padding:4px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;cursor:pointer;transition:all .15s}
.user-badge:hover{border-color:var(--border2)}
.user-avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.user-name{font-size:12px;color:var(--ink2);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.logout-btn{font-size:11px;color:var(--ink3);cursor:pointer;padding:4px 8px;border-radius:6px;border:none;background:transparent;transition:all .15s}
.logout-btn:hover{color:var(--red);background:var(--red-dim)}

/* LAYOUT */
.layout{display:flex;padding-top:54px;min-height:100vh}
.sidebar{width:252px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);height:calc(100vh - 54px);position:sticky;top:54px;overflow-y:auto;padding:.75rem 0}
.sb-head{font-size:10px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:var(--ink3);padding:.6rem 1rem .3rem}
.sb-nav{display:flex;align-items:center;gap:8px;padding:7px 1rem;cursor:pointer;transition:background .15s;font-size:13px;color:var(--ink2);user-select:none}
.sb-nav:hover,.sb-nav.active{background:var(--bg3);color:var(--ink)}
.sb-nav-ico{font-size:13px;width:18px;text-align:center;flex-shrink:0}
.sb-badge{margin-left:auto;font-size:10px;padding:1px 7px;border-radius:10px;font-weight:600}
.sb-badge-gold{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(201,169,110,.3)}
.sb-badge-green{background:var(--green-dim);color:var(--green);border:1px solid rgba(76,175,125,.3)}
.sb-badge-teal{background:var(--teal-dim);color:var(--teal);border:1px solid rgba(60,191,180,.3)}
.sb-badge-red{background:var(--red-dim);color:var(--red);border:1px solid rgba(224,82,82,.3)}
.sb-div{height:1px;background:var(--border);margin:.5rem .75rem}
.dom-row{display:flex;align-items:center;justify-content:space-between;padding:6px 1rem;cursor:pointer;transition:background .15s;border-left:2px solid transparent;user-select:none}
.dom-row:hover{background:var(--bg3)}
.dom-row.open,.dom-row.active-d{background:var(--bg3);border-left-color:var(--gold)}
.dom-left{display:flex;align-items:center;gap:7px;min-width:0}
.dom-ico{font-size:13px;width:18px;text-align:center;flex-shrink:0}
.dom-nm{font-size:12.5px;color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color .15s}
.dom-row:hover .dom-nm,.dom-row.open .dom-nm,.dom-row.active-d .dom-nm{color:var(--ink)}
.dom-arr{width:12px;height:12px;stroke:var(--ink3);fill:none;stroke-width:2;transition:transform .2s;flex-shrink:0}
.dom-row.open .dom-arr{transform:rotate(90deg)}
.subs-wrap{display:none;background:var(--bg)}
.subs-wrap.open{display:block}
.sub-row{padding:5px 1rem 5px 2.5rem;cursor:pointer;transition:background .15s;border-left:2px solid transparent}
.sub-row:hover{background:var(--bg3)}
.sub-row.active-s{border-left-color:var(--gold);background:rgba(201,169,110,0.05)}
.sub-nm{font-size:12px;color:var(--ink3);transition:color .15s}
.sub-row:hover .sub-nm,.sub-row.active-s .sub-nm{color:var(--ink2)}

/* MAIN */
main{flex:1;padding:1.5rem;min-width:0;overflow-x:hidden}
.bc{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--ink3);margin-bottom:1rem;flex-wrap:wrap}
.bc-item{cursor:pointer;transition:color .15s}.bc-item:hover{color:var(--ink2)}
.bc-cur{color:var(--ink);font-weight:500}.bc-sep{color:var(--border2)}
.hero{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1.25rem;flex-wrap:wrap}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--ink);line-height:1.15}
.hero-sub{font-size:12px;color:var(--ink3);margin-top:3px}
.section-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;color:var(--ink);margin-bottom:.875rem;display:flex;align-items:center;gap:10px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* FILTERS */
.filter-bar{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:1.25rem;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:.625rem .875rem}
.filter-group{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.filter-sep-v{width:1px;height:18px;background:var(--border2);flex-shrink:0;margin:0 2px}
.filter-label{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--ink3);white-space:nowrap}
.tchip{padding:4px 10px;border-radius:20px;border:1px solid transparent;background:transparent;font-family:'Syne',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:4px}
.tchip .tdc{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.tchip-juri{color:var(--gold);border-color:rgba(201,169,110,.3)}.tchip-juri.active,.tchip-juri:hover{background:var(--gold-dim);border-color:var(--gold)}.tchip-juri .tdc{background:var(--gold)}
.tchip-loi{color:var(--green);border-color:rgba(76,175,125,.3)}.tchip-loi.active,.tchip-loi:hover{background:var(--green-dim);border-color:var(--green)}.tchip-loi .tdc{background:var(--green)}
.tchip-ord{color:var(--blue);border-color:rgba(91,143,212,.3)}.tchip-ord.active,.tchip-ord:hover{background:var(--blue-dim);border-color:var(--blue)}.tchip-ord .tdc{background:var(--blue)}
.tchip-dec{color:var(--purple);border-color:rgba(155,114,207,.3)}.tchip-dec.active,.tchip-dec:hover{background:var(--purple-dim);border-color:var(--purple)}.tchip-dec .tdc{background:var(--purple)}
.tchip-cir{color:var(--amber);border-color:rgba(224,154,60,.3)}.tchip-cir.active,.tchip-cir:hover{background:var(--amber-dim);border-color:var(--amber)}.tchip-cir .tdc{background:var(--amber)}
.tchip-all{color:var(--ink2);border-color:var(--border)}.tchip-all.active,.tchip-all:hover{background:var(--bg4);border-color:var(--border2);color:var(--ink)}
.pchip{padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;font-family:'Syne',sans-serif;font-size:11px;font-weight:500;color:var(--ink3);cursor:pointer;transition:all .15s}
.pchip:hover{border-color:var(--border2);color:var(--ink2)}
.pchip.active{background:var(--gold);color:#1A1200;border-color:var(--gold);font-weight:600}
.year-sel{background:var(--bg4);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-family:'Syne',sans-serif;font-size:11px;color:var(--ink3);outline:none;cursor:pointer}
.view-toggle{display:flex;gap:4px;margin-left:auto}
.vtbtn{padding:5px 10px;border-radius:7px;border:1px solid var(--border);background:transparent;font-family:'Syne',sans-serif;font-size:11px;color:var(--ink3);cursor:pointer;transition:all .15s}
.vtbtn.active{background:var(--bg4);border-color:var(--border2);color:var(--ink)}

/* STATS */
.stats-row{display:flex;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap}
.stat-pill{display:flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:8px 14px;flex:1;min-width:90px}
.stat-val{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700}
.stat-lbl{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.8px}
.sv-juri{color:var(--gold)}.sv-loi{color:var(--green)}.sv-ord{color:var(--blue)}.sv-dec{color:var(--purple)}

/* GRIDS */
.dom-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px;margin-bottom:2rem}
.dom-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:1rem;cursor:pointer;transition:all .2s}
.dom-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.dc-ico{font-size:20px;margin-bottom:.5rem}.dc-name{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:3px;line-height:1.3}
.dc-count{font-size:11px;color:var(--ink3)}.dc-bar{height:2px;background:var(--border);border-radius:1px;margin-top:.75rem;overflow:hidden}
.dc-bar-fill{height:100%;background:var(--gold);border-radius:1px}
.sub-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:9px;margin-bottom:2rem}
.sub-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:1rem;cursor:pointer;transition:all .2s}
.sub-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.sc-name{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:4px;line-height:1.3}
.sc-count{font-size:11px;color:var(--ink3)}.sc-bar{height:2px;background:var(--border);border-radius:1px;margin-top:.75rem;overflow:hidden}
.sc-bar-fill{height:100%;background:var(--gold);border-radius:1px}
.theme-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:9px;margin-bottom:1.5rem}
.theme-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:1rem 1.125rem;cursor:pointer;transition:all .2s;display:flex;flex-direction:column}
.theme-card:hover{border-color:var(--border2);background:var(--bg4)}
.tc-name{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:.5rem;line-height:1.3}
.tc-footer{display:flex;align-items:center;justify-content:space-between;padding-top:.5rem;border-top:1px solid var(--border);margin-top:auto}
.tc-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500;background:rgba(201,169,110,.12);color:var(--gold);border:1px solid rgba(201,169,110,.25)}
.tc-btn{font-size:11px;color:var(--ink3);transition:color .15s}
.theme-card:hover .tc-btn{color:var(--gold)}

/* RESULT CARDS */
.results-list{display:flex;flex-direction:column;gap:10px}
.result-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:1.125rem 1.375rem;transition:all .2s;position:relative;overflow:hidden}
.result-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.result-card.type-juri::before{background:var(--gold)}.result-card.type-loi::before{background:var(--green)}
.result-card.type-ord::before{background:var(--blue)}.result-card.type-dec::before{background:var(--purple)}
.result-card.type-cir::before{background:var(--amber)}
.result-card:hover{border-color:var(--border2);background:var(--bg4)}
.result-card.fav{outline:1px solid rgba(201,169,110,.4)}
.rc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:.625rem}
.rc-badges{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.badge{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.3px}
.bdg-juri{background:rgba(201,169,110,.15);color:var(--gold);border:1px solid rgba(201,169,110,.3)}
.bdg-loi{background:var(--green-dim);color:var(--green);border:1px solid rgba(76,175,125,.3)}
.bdg-ord{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(91,143,212,.3)}
.bdg-dec{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(155,114,207,.3)}
.bdg-cir{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(224,154,60,.3)}
.bdg-P{background:rgba(201,169,110,.15);color:var(--gold);border:1px solid rgba(201,169,110,.3)}
.bdg-B{background:var(--green-dim);color:var(--green);border:1px solid rgba(76,175,125,.3)}
.bdg-R{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(91,143,212,.3)}
.bdg-imp{background:rgba(224,82,82,.12);color:var(--red);border:1px solid rgba(224,82,82,.3);font-size:9px}
.rc-right{display:flex;align-items:center;gap:6px}
.rc-date{font-size:11px;color:var(--ink3);white-space:nowrap}
.icon-btn{width:26px;height:26px;border-radius:6px;background:transparent;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;font-size:12px}
.icon-btn:hover{border-color:var(--border2);background:var(--bg4)}
.icon-btn.fav-btn.active,.icon-btn.fav-btn:hover{border-color:var(--gold);background:var(--gold-dim)}
.icon-btn.annot-btn:hover{border-color:var(--teal);background:var(--teal-dim)}
.rc-titre-admin{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--ink);line-height:1.35;margin-bottom:.35rem}
.rc-titre-original{font-size:11.5px;color:var(--ink3);margin-bottom:.35rem}
.rc-resume-toggle{font-size:11px;color:var(--gold);cursor:pointer;margin-top:.375rem;display:inline-flex;align-items:center;gap:4px;background:none;border:none;font-family:'Syne',sans-serif;font-weight:500;padding:0}
.rc-resume-toggle:hover{opacity:.75}
.rc-resume-wrap{display:none;margin-top:.625rem;padding:.75rem;background:var(--bg2);border-radius:8px;border-left:2px solid var(--gold)}
.rc-resume-wrap.open{display:block}
.rc-resume-text{font-size:13px;color:var(--ink2);line-height:1.65}
.rc-meta{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--ink3);margin-top:.375rem}
.rc-importance{margin-top:.5rem;padding:.375rem .625rem;background:rgba(224,82,82,.06);border:1px solid rgba(224,82,82,.15);border-radius:6px;font-size:11px;color:var(--ink3)}
.rc-footer{display:flex;align-items:center;justify-content:space-between;margin-top:.875rem;padding-top:.625rem;border-top:1px solid var(--border)}
.rc-path{font-size:11px;color:var(--ink3);display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.rc-link{font-size:12px;color:var(--gold);font-weight:500;text-decoration:none;transition:opacity .15s}
.rc-link:hover{opacity:.75}
.admin-edit-zone{margin-top:.75rem;padding:.75rem;background:rgba(155,114,207,.06);border:1px solid rgba(155,114,207,.2);border-radius:8px;display:none}
.admin-edit-zone.open{display:block}
.admin-edit-inp{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:7px;padding:7px 10px;font-family:'Syne',sans-serif;font-size:13px;color:var(--ink);outline:none;margin-bottom:.5rem}
.admin-edit-inp:focus{border-color:var(--purple)}
.admin-edit-actions{display:flex;gap:.5rem}
.btn-save-admin{padding:6px 14px;background:var(--purple);color:#fff;border:none;border-radius:6px;font-family:'Syne',sans-serif;font-size:12px;font-weight:600;cursor:pointer}
.btn-cancel-sm{padding:6px 12px;background:transparent;border:1px solid var(--border2);border-radius:6px;font-family:'Syne',sans-serif;font-size:12px;color:var(--ink3);cursor:pointer}

/* ANNOTATIONS */
.annot-panel{margin-top:.875rem;border-top:1px solid var(--border);padding-top:.875rem;display:none}
.annot-panel.open{display:block}
.annot-list{display:flex;flex-direction:column;gap:.5rem;margin-bottom:.75rem}
.annot-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:.625rem .875rem}
.annot-header{display:flex;align-items:center;gap:7px;margin-bottom:.25rem;flex-wrap:wrap}
.annot-avatar{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.annot-author{font-size:11px;font-weight:600;color:var(--ink2)}
.annot-time{font-size:10px;color:var(--ink3);margin-left:auto}
.annot-text{font-size:12.5px;color:var(--ink2);line-height:1.5}

// ══ AUTH ══
function openAuth(){document.getElementById('authOverlay').classList.add('open');}
function closeAuth(){document.getElementById('authOverlay').classList.remove('open');}
function closeAuthOnBg(e){if(e.target===document.getElementById('authOverlay'))closeAuth();}
function switchAuthTab(tab){
  authTab=tab;
  document.querySelectorAll('.auth-tab').forEach((b,i)=>b.classList.toggle('active',(tab==='login'?i===0:i===1)));
  document.getElementById('authBtn').textContent=tab==='login'?'Se connecter':'Créer mon compte';
  document.getElementById('authErr').textContent='';
}

async function authSubmit(){
  const email=document.getElementById('authEmail').value.trim();
  const password=document.getElementById('authPassword').value.trim();
  const errEl=document.getElementById('authErr');
  if(!email||!password){errEl.textContent='Email et mot de passe requis.';return;}
  document.getElementById('authBtn').textContent='…';errEl.textContent='';
  try{
    const r=await fetch(`${PROXY}/auth/${authTab==='login'?'login':'signup'}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const data=await r.json();
    if(!r.ok||data.error)throw new Error(data.error||'Erreur');
    session=data.session;currentUser=data.user;
    localStorage.setItem('lt_session',JSON.stringify({session,user:currentUser}));
    closeAuth();
    updateTopbar();
    loadFavIds();
    loadAlertes();
    buildSB();
    showToast('✓',`Bienvenue ${currentUser.email.split('@')[0]} !`);
  }catch(err){
    errEl.textContent=err.message;
    document.getElementById('authBtn').textContent=authTab==='login'?'Se connecter':'Créer mon compte';
  }
}

function logout(){
  session=null;currentUser=null;favIds=new Set();alertes=[];
  localStorage.removeItem('lt_session');
  updateTopbar();buildSB();
  showToast('✓','Déconnecté');
}

function updateTopbar(){
  const zone=document.getElementById('userZone');
  const btnAdmin=document.getElementById('btnAdmin');
  if(currentUser){
    const c=AVATAR_COLORS[currentUser.role==='admin'?0:2];
    const initials=currentUser.email.split('@')[0].slice(0,2).toUpperCase();
    zone.innerHTML=`<div class="user-badge">
      <div class="user-avatar" style="background:${c.bg};color:${c.fg}">${initials}</div>
      <span class="user-name">${currentUser.role==='admin'?'Admin':currentUser.email.split('@')[0]}</span>
    </div>
    <button class="logout-btn" onclick="logout()">Déconnexion</button>`;
    btnAdmin.style.display=currentUser.role==='admin'?'':'none';
  }else{
    zone.innerHTML=`<button class="btn-top btn-login" onclick="openAuth()">Connexion</button>`;
    btnAdmin.style.display='none';
  }
}

// ══ API HELPER ══
async function api(method,path,body){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(session?.access_token)opts.headers['Authorization']=`Bearer ${session.access_token}`;
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(`${PROXY}${path}`,opts);
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error||`HTTP ${r.status}`);}
  return r.json();
}

async function loadFavIds(){
  if(!session?.access_token)return;
  try{const r=await api('GET','/favoris');favIds=new Set((r||[]).map(f=>f.id));buildSB();}catch(e){}
}

async function loadAlertes(){
  if(!session?.access_token)return;
  try{alertes=await api('GET','/alertes');buildSB();}catch(e){}
}

  let html=`<div class="sb-head">Navigation</div>
    <div class="sb-nav ${curView==='home'?'active':''}" onclick="showHome()"><span class="sb-nav-ico">🏠</span>Accueil</div>

  if(currentUser){
    html+=`<div class="sb-nav ${curView==='alertes'?'active':''}" onclick="showAlertes()"><span class="sb-nav-ico">🔔</span>Mes alertes${alertCount?`<span class="sb-badge sb-badge-red">${alertCount}</span>`:''}</div>
    <div class="sb-nav ${curView==='favs'?'active':''}" onclick="showFavs()"><span class="sb-nav-ico">⭐</span>Mes favoris${favIds.size?`<span class="sb-badge sb-badge-gold">${favIds.size}</span>`:''}</div>
    <div class="sb-nav ${curView==='collab'?'active':''}" onclick="showCollab()"><span class="sb-nav-ico">👥</span>Espace équipe</div>`;
  }else{
    html+=`<div class="sb-nav" onclick="openAuth()" style="color:var(--ink3)"><span class="sb-nav-ico">🔔</span>Alertes <span style="font-size:10px;margin-left:auto">(connexion)</span></div>
    <div class="sb-nav" onclick="openAuth()" style="color:var(--ink3)"><span class="sb-nav-ico">⭐</span>Favoris <span style="font-size:10px;margin-left:auto">(connexion)</span></div>
    <div class="sb-nav" onclick="openAuth()" style="color:var(--ink3)"><span class="sb-nav-ico">👥</span>Équipe <span style="font-size:10px;margin-left:auto">(connexion)</span></div>`;
  }
  html+=`<div class="sb-div"></div><div class="sb-head">Domaines</div>`;
  DOMAINS.forEach(d=>{
    const isOpen=openDoms.has(d.id);
    html+=`<div class="dom-row ${isOpen?'open':''} ${curDom===d.id&&!curSub?'active-d':''}" onclick="toggleDom('${d.id}')">
      <div class="dom-left"><span class="dom-ico">${d.icon}</span><span class="dom-nm">${d.name}</span></div>
      <svg class="dom-arr" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </div><div class="subs-wrap ${isOpen?'open':''}">`;
    d.subs.forEach(s=>{html+=`<div class="sub-row ${curDom===d.id&&curSub===s.name?'active-s':''}" onclick="selectSub('${d.id}','${ec(s.name)}')"><div class="sub-nm">${s.name}</div></div>`;});
    html+=`</div>`;
  });
  sb.innerHTML=html;
}
function ec(s){return s.replace(/'/g,"\\'");}
function toggleDom(id){
  if(openDoms.has(id)&&curDom===id&&!curSub){openDoms.delete(id);curDom=null;buildSB();renderHome();return;}
  openDoms.add(id);curDom=id;curSub=null;curTheme=null;buildSB();renderDomView(id);
}
function selectSub(domId,subName){curDom=domId;curSub=subName;curTheme=null;curView='sub';openDoms.add(domId);buildSB();renderSubView(domId,subName);}

function buildPath(domaine,sousCat,theme){
  const parts=[];
  if(domaine)parts.push(`<span class="nc-path-item">${domaine}</span>`);
  if(sousCat)parts.push(`<span class="nc-path-sep">›</span><span class="nc-path-item">${sousCat}</span>`);
  if(theme&&theme!==sousCat)parts.push(`<span class="nc-path-sep">›</span><span class="nc-path-item">${theme}</span>`);
  return parts.join('');
}

function extractKeywords(titre,theme){
  const kws=new Set();
  if(theme)kws.add(theme);
  const m=titre.match(/\b(licenciement|bail|contrat|responsabilité|prescription|nullité|résiliation|indemnité|faute|préjudice|cession|dissolution|cautionnement|hypothèque|arbitrage|concurrence|marque|brevet)\b/gi);
  if(m)m.slice(0,4).forEach(w=>kws.add(w.toLowerCase()));
  return[...kws].slice(0,5);
}

function toggleNcResume(btn){
  const wrap=btn.nextElementSibling;
  wrap.classList.toggle('open');
  btn.textContent=wrap.classList.contains('open')?'▾ Masquer l\'analyse':'▸ Voir l\'analyse juridique';
}

// ══ FETCH API ══
async function getToken(){
  const r=await fetch(`${PROXY}/token`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clientId:creds.id,clientSecret:creds.secret})});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error||'Proxy inaccessible');}
  const d=await r.json();
  if(!d.access_token)throw new Error('Token invalide');
  return d.access_token;
}

function evalImportance(item){
  let score=0;const reasons=[];
  if((item.nbArticles||0)>20){score+=3;reasons.push(`${item.nbArticles} articles`);}
  else if((item.nbArticles||0)>5)score+=1;
  if((item.nature||'').includes('LOI_ORGANIQUE')){score+=4;reasons.push('loi organique');}
  if((item.nature||'').includes('LOI_FINANCES')){score+=3;reasons.push('loi de finances');}
  return{important:score>=4,score,reasons};
}

async function fetchAll(domId,subName,theme){
  const keyword=theme||subName;
  const d=DOMAINS.find(x=>x.id===domId);
  const el=document.getElementById('themeResults')||document.getElementById('subResults');
  if(!el)return;
  el.innerHTML='<div class="cstate"><div class="spinner"></div></div>';
  try{
    const token=await getToken();
    const [juriItems,textItems]=await Promise.all([
      fetchJuri(token,keyword,d.chambre,domId,subName,theme),
      fetchTextes(token,keyword,domId,subName,theme)
    ]);
    allResults=[...juriItems,...textItems].sort((a,b)=>new Date(b.date)-new Date(a.date));
    updateStats();rebuildFilterBar();
    allResults.forEach(r=>saveBG(r));
    applyFilters(el);
    allResults.filter(r=>r.type==='juri'&&!r.resume).forEach(r=>loadSummaryBG(r));
  }catch(err){el.innerHTML=`<div class="cstate"><div class="cs-ico">⚠️</div><div class="cs-title" style="color:var(--red)">${err.message}</div></div>`;}
}

async function fetchJuri(token,keyword,chambre,domId,subName,theme){
  const body={fond:'CASS',recherche:{champs:[{typeChamp:'TOUS',criteres:[{typeRecherche:'UN_DES_MOTS',valeur:keyword}]}],filtres:[],sort:'DATE_DESC',typePagination:'DEFAULT',pageNumber:1,pageSize:25}};
  const r=await fetch(`${PROXY}/search`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,body})});
  const data=await r.json();
  const d=DOMAINS.find(x=>x.id===domId);
  return(data?.results||[]).map(item=>{
    const pub=(item.decision?.publiéBulletin||item.decision?.publication||'I').charAt(0).toUpperCase();
    const dateStr=item.decision?.dateDecision||item.decision?.date||'';
    
    return{id:item.id||item.decision?.id||Math.random().toString(36),type:'juri',titre:item.decision?.titre||item.titre||'Arrêt',titre_admin:null,resume:null,date:dateStr,year:new Date(dateStr).getFullYear(),formation:(item.decision?.formation||chambre).replace(/_/g,' '),numero:item.decision?.numero||'',publication:['P','B','R'].includes(pub)?pub:'I',important:['P','B','R'].includes(pub),importanceReasons:pub==='P'?['Publié au Bulletin']:[],lien:item.decision?.id?`https://www.legifrance.gouv.fr/juri/id/${item.decision.id}`:'https://www.legifrance.gouv.fr',nor:'',nbArticles:0,nature:'',domain:d?.name||'',sub:subName,theme:theme||''};
  }).filter(a=>a&&a.id);
}

async function fetchTextes(token,keyword,domId,subName,theme){
  const results=[];const d=DOMAINS.find(x=>x.id===domId);
  for(const fond of['LEGI','JORF']){
    try{
      const body={fond,recherche:{champs:[{typeChamp:'TOUS',criteres:[{typeRecherche:'UN_DES_MOTS',valeur:keyword}]}],sort:'DATE_DESC',typePagination:'DEFAULT',pageNumber:1,pageSize:15}};
      const r=await fetch(`${PROXY}/search`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,body})});
      const data=await r.json();
      (data?.results||[]).forEach(item=>{
        const nature=(item.nature||item.text?.nature||'').toUpperCase();
        let type='loi';
        if(nature.includes('ORDONNANCE'))type='ord';
        else if(nature.includes('DECRET')||nature.includes('DÉCRET'))type='dec';
        else if(nature.includes('CIRCULAIRE'))type='cir';
        else if(nature.includes('LOI'))type='loi';
        else return;
        const dateStr=item.dateTexte||item.text?.dateTexte||'';
        
        const nbArt=item.nbArticles||0;
        const imp=evalImportance({nature,nbArticles:nbArt});
        results.push({id:item.id||item.text?.id||Math.random().toString(36),type,titre:item.titre||item.text?.titre||'Texte',titre_admin:null,resume:null,date:dateStr,year:new Date(dateStr).getFullYear(),formation:'',numero:'',publication:'',important:imp.important,importanceReasons:imp.reasons,lien:item.text?.id?`https://www.legifrance.gouv.fr/loda/id/${item.text.id}`:'https://www.legifrance.gouv.fr',nor:item.nor||'',nbArticles:nbArt,nature,domain:d?.name||'',sub:subName,theme:theme||''});
      });
    }catch(e){}
  }
  return results;
}

async function saveBG(r){
  try{await fetch(`${PROXY}/arrets/save`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({arret:r})});}catch(e){}
}

async function loadSummaryBG(result){
  try{

    const data=await r.json();
    if(!data.titre_admin&&!data.resume)return;
    const idx=allResults.findIndex(x=>x.id===result.id);

    if(data.resume){

      if(rtxt){rtxt.textContent=data.resume;if(rtog)rtog.style.display='';}

}

function renderTimeline(results,el){
  if(!results.length){el.innerHTML='<div class="cstate"><div class="cs-ico">📭</div><div class="cs-title">Aucun résultat</div></div>';return;}
  const byYear={};
  results.forEach(r=>{const y=r.year||'?';if(!byYear[y])byYear[y]=[];byYear[y].push(r);});
  let html='<div class="timeline">';
  Object.keys(byYear).sort((a,b)=>b-a).forEach(year=>{
    const items=byYear[year];
    html+=`<div class="tl-year-group"><div class="tl-year"><div class="tl-year-dot"></div><span class="tl-year-label">${year}</span><span class="tl-year-count">${items.length} élément${items.length>1?'s':''}</span></div>`;
    items.forEach(r=>{
      const T=TYPES[r.type]||TYPES.juri;
      const date=r.date?new Date(r.date).toLocaleDateString('fr-FR',{day:'numeric',month:'long'}):'';
      const titre=r.titre_admin&&r.titre_admin!==r.titre?r.titre_admin:r.titre;
      html+=`<div class="tl-item"><div class="tl-dot ${T.dot}"></div>
        <div class="tl-card" onclick="window.open('${r.lien}','_blank')">
          <div class="tl-card-top"><span class="badge ${T.cls}">${T.label}</span>${r.publication&&r.publication!=='I'?`<span class="badge bdg-${r.publication}">${r.publication}</span>`:''}${r.important?`<span class="badge bdg-imp">⚡</span>`:''}
          <a class="tl-link" href="${r.lien}" target="_blank" onclick="event.stopPropagation()">Légifrance →</a></div>

          <div class="tl-meta"><span>${date}</span>${r.domain?`<span>${r.domain}</span>`:''}${r.formation?`<span>${r.formation}</span>`:''}</div>
        </div>
      </div>`;
    });
    html+=`</div>`;
  });
  html+='</div>';el.innerHTML=html;
}

// ══ SEARCH ══
function handleSearch(q){
  if(!q.trim()||!allResults.length)return;
  const q2=q.toLowerCase();
  const filtered=getFiltered().filter(r=>(r.titre||'').toLowerCase().includes(q2)||(r.titre_admin||'').toLowerCase().includes(q2)||(r.numero||'').toLowerCase().includes(q2));
  const el=document.getElementById('themeResults')||document.getElementById('subResults');
  if(el){if(viewMode==='timeline')renderTimeline(filtered,el);else renderList(filtered,el);}
}

// ══ MODALS ══
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function closeBg(e,id){if(e.target===document.getElementById(id))closeModal(id);}

// ══ TOAST ══
function showToast(ico,msg){
  const t=document.getElementById('toast');
  document.getElementById('toastIco').textContent=ico;
  document.getElementById('toastMsg').textContent=msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2800);
}

// ══ INIT ══
(function init(){
  const saved=localStorage.getItem('lt_session');
  if(saved){try{const p=JSON.parse(saved);session=p.session;currentUser=p.user;}catch(e){}}
  const savedCreds=localStorage.getItem('lt_creds');
  if(savedCreds){try{const c=JSON.parse(savedCreds);creds=c;if(c.id&&c.secret)connected=true;}catch(e){}}
  updateTopbar();buildSB();renderHome();
  if(currentUser){loadFavIds();loadAlertes();}
  // Lien veille partagée
  const params=new URLSearchParams(location.search);
  const veilleId=params.get('veille');
  if(veilleId){
    setTimeout(async()=>{
      if(!currentUser){openAuth();showToast('👥','Connectez-vous pour rejoindre cette veille');}
      else{try{await api('POST',`/veilles/${veilleId}/join`);showCollab();showToast('👥','Veille rejointe !');}catch(e){}}
    },500);
  }
})();
</script>
