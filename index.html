<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LegalTrack — Veille Juridique</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Syne:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D0F0E;--bg2:#131614;--bg3:#1A1D1B;--bg4:#222622;
  --border:#2C312D;--border2:#3A403C;
  --ink:#F0EDE6;--ink2:#A8B0A4;--ink3:#6B7568;
  --gold:#C9A96E;--gold-dim:#3D3020;
  --green:#4CAF7D;--green-dim:#1A2E22;
  --blue:#5B8FD4;--blue-dim:#1A2340;
  --red:#E05252;--red-dim:#2E1A1A;
  --purple:#9B72CF;--purple-dim:#2A1E3D;
  --amber:#E09A3C;--amber-dim:#2E2210;
  --teal:#3CBFB4;--teal-dim:#0E2826;
  --r:10px;--r2:14px;
}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;font-size:14px;line-height:1.6;overflow-x:hidden}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* AUTH */
.auth-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:800;display:none;align-items:center;justify-content:center;padding:1rem}
.auth-overlay.open{display:flex}
.auth-box{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);padding:2rem;width:100%;max-width:380px}
.auth-logo{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:.25rem}
.auth-logo-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold)}
.auth-tagline{font-size:12px;color:var(--ink3);text-align:center;margin-bottom:1.5rem}
.auth-tabs{display:flex;gap:4px;background:var(--bg2);border-radius:var(--r);padding:3px;margin-bottom:1.25rem}
.auth-tab{flex:1;padding:7px;border-radius:8px;border:none;background:transparent;font-family:'Syne',sans-serif;font-size:12px;font-weight:500;color:var(--ink3);cursor:pointer;transition:all .15s}
.auth-tab.active{background:var(--bg3);color:var(--ink);border:1px solid var(--border)}
.auth-field{margin-bottom:.875rem}
.auth-label{display:block;font-size:10px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.auth-input{width:100%;padding:9px 12px;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;font-family:'Syne',sans-serif;font-size:13px;color:var(--ink);outline:none;transition:border-color .15s}
.auth-input:focus{border-color:var(--gold)}
.auth-input::placeholder{color:var(--ink3)}
.auth-btn{width:100%;padding:10px;background:var(--gold);color:#1A1200;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;margin-top:.25rem;transition:opacity .2s}
.auth-btn:hover{opacity:.85}
.auth-err{font-size:12px;color:var(--red);margin-top:.5rem;text-align:center;min-height:16px}
.auth-skip{font-size:12px;color:var(--ink3);text-align:center;margin-top:.875rem;cursor:pointer;transition:color .15s}
.auth-skip:hover{color:var(--ink2)}

/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;z-index:300;height:54px;background:rgba(13,15,14,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem;gap:1rem}
.logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:8px;white-space:nowrap;cursor:pointer}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold)}
.topbar-center{flex:1;max-width:460px;position:relative}
.search-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 12px 7px 34px;font-family:'Syne',sans-serif;font-size:13px;color:var(--ink);outline:none;transition:border-color .2s}
.search-input::placeholder{color:var(--ink3)}
.search-input:focus{border-color:var(--border2)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:13px;height:13px;stroke:var(--ink3);fill:none;stroke-width:2}
.topbar-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
.btn-top{padding:6px 13px;border-radius:7px;font-family:'Syne',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap;border:none}
.btn-login{background:var(--bg3);color:var(--ink2);border:1px solid var(--border)!important}
.btn-login:hover{color:var(--ink);border-color:var(--border2)!important}
.btn-nl{background:var(--gold);color:#1A1200;font-weight:600}
.btn-nl:hover{opacity:.85}
.btn-admin{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(155,114,207,.35)!important}
.user-badge{display:flex;align-items:center;gap:6px;padding:4px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;cursor:pointer;transition:all .15s}
.user-badge:hover{border-color:var(--border2)}
.user-avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.user-name{font-size:12px;color:var(--ink2);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.logout-btn{font-size:11px;color:var(--ink3);cursor:pointer;padding:4px 8px;border-radius:6px;border:none;background:transparent;transition:all .15s}
.logout-btn:hover{color:var(--red);background:var(--red-dim)}

/* LAYOUT */
.layout{display:flex;padding-top:54px;min-height:100vh}
.sidebar{width:252px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);height:calc(100vh - 54px);position:sticky;top:54px;overflow-y:auto;padding:.75rem 0}
.sb-head{font-size:10px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:var(--ink3);padding:.6rem 1rem .3rem}
.sb-nav{display:flex;align-items:center;gap:8px;padding:7px 1rem;cursor:pointer;transition:background .15s;font-size:13px;color:var(--ink2);user-select:none}
.sb-nav:hover,.sb-nav.active{background:var(--bg3);color:var(--ink)}
.sb-nav-ico{font-size:13px;width:18px;text-align:center;flex-shrink:0}
.sb-badge{margin-left:auto;font-size:10px;padding:1px 7px;border-radius:10px;font-weight:600}
.sb-badge-gold{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(201,169,110,.3)}
.sb-badge-green{background:var(--green-dim);color:var(--green);border:1px solid rgba(76,175,125,.3)}
.sb-badge-red{background:var(--red-dim);color:var(--red);border:1px solid rgba(224,82,82,.3)}
.sb-badge-teal{background:var(--teal-dim);color:var(--teal);border:1px solid rgba(60,191,180,.3)}
.sb-div{height:1px;background:var(--border);margin:.5rem .75rem}
.dom-row{display:flex;align-items:center;justify-content:space-between;padding:6px 1rem;cursor:pointer;transition:background .15s;border-left:2px solid transparent;user-select:none}
.dom-row:hover{background:var(--bg3)}
.dom-row.open,.dom-row.active-d{background:var(--bg3);border-left-color:var(--gold)}
.dom-left{display:flex;align-items:center;gap:7px;min-width:0}
.dom-ico{font-size:13px;width:18px;text-align:center;flex-shrink:0}
.dom-nm{font-size:12.5px;color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color .15s}
.dom-row:hover .dom-nm,.dom-row.open .dom-nm,.dom-row.active-d .dom-nm{color:var(--ink)}
.dom-arr{width:12px;height:12px;stroke:var(--ink3);fill:none;stroke-width:2;transition:transform .2s;flex-shrink:0}
.dom-row.open .dom-arr{transform:rotate(90deg)}
.subs-wrap{display:none;background:var(--bg)}
.subs-wrap.open{display:block}
.sub-row{padding:5px 1rem 5px 2.5rem;cursor:pointer;transition:background .15s;border-left:2px solid transparent}
.sub-row:hover{background:var(--bg3)}
.sub-row.active-s{border-left-color:var(--gold);background:rgba(201,169,110,0.05)}
.sub-nm{font-size:12px;color:var(--ink3);transition:color .15s}
.sub-row:hover .sub-nm,.sub-row.active-s .sub-nm{color:var(--ink2)}

/* MAIN */
main{flex:1;padding:1.5rem;min-width:0;overflow-x:hidden}
.bc{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--ink3);margin-bottom:1rem;flex-wrap:wrap}
.bc-item{cursor:pointer;transition:color .15s}.bc-item:hover{color:var(--ink2)}
.bc-cur{color:var(--ink);font-weight:500}.bc-sep{color:var(--border2)}
.hero{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1.25rem;flex-wrap:wrap}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--ink);line-height:1.15}
.hero-sub{font-size:12px;color:var(--ink3);margin-top:3px}
.section-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;color:var(--ink);margin-bottom:.875rem;display:flex;align-items:center;gap:10px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* GRIDS */
.dom-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:9px;margin-bottom:2rem}
.dom-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:1rem;cursor:pointer;transition:all .2s}
.dom-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.dc-ico{font-size:20px;margin-bottom:.5rem}
.dc-name{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:3px;line-height:1.3}
.dc-count{font-size:11px;color:var(--ink3)}
.dc-bar{height:2px;background:var(--border);border-radius:1px;margin-top:.75rem;overflow:hidden}
.dc-bar-fill{height:100%;background:var(--gold);border-radius:1px}
.sub-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:9px;margin-bottom:2rem}
.sub-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:1rem;cursor:pointer;transition:all .2s}
.sub-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.sc-name{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:4px;line-height:1.3}
.sc-count{font-size:11px;color:var(--ink3)}
.sc-bar{height:2px;background:var(--border);border-radius:1px;margin-top:.75rem;overflow:hidden}
.sc-bar-fill{height:100%;background:var(--gold);border-radius:1px}

/* FILTERS */
.filter-bar{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:1.25rem;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:.625rem .875rem}
.filter-group{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.filter-sep-v{width:1px;height:18px;background:var(--border2);flex-shrink:0;margin:0 2px}
.filter-label{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--ink3);white-space:nowrap}
.pchip{padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;font-family:'Syne',sans-serif;font-size:11px;font-weight:500;color:var(--ink3);cursor:pointer;transition:all .15s}
.pchip:hover{border-color:var(--border2);color:var(--ink2)}
.pchip.active{background:var(--gold);color:#1A1200;border-color:var(--gold);font-weight:600}
.view-toggle{display:flex;gap:4px;margin-left:auto}
.vtbtn{padding:5px 10px;border-radius:7px;border:1px solid var(--border);background:transparent;font-family:'Syne',sans-serif;font-size:11px;color:var(--ink3);cursor:pointer;transition:all .15s}
.vtbtn.active{background:var(--bg4);border-color:var(--border2);color:var(--ink)}

/* STATS */
.stats-row{display:flex;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap}
.stat-pill{display:flex;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:8px 14px;flex:1;min-width:90px}
.stat-val{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--gold)}
.stat-lbl{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.8px}

/* RESULT CARDS */
.results-list{display:flex;flex-direction:column;gap:10px}
.result-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:1.125rem 1.375rem;transition:all .2s;position:relative;overflow:hidden}
.result-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold)}
.result-card:hover{border-color:var(--border2);background:var(--bg4)}
.result-card.fav{outline:1px solid rgba(201,169,110,.4)}
.rc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:.625rem}
.rc-badges{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.badge{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.3px}
.bdg-P{background:rgba(201,169,110,.15);color:var(--gold);border:1px solid rgba(201,169,110,.3)}
.bdg-B{background:var(--green-dim);color:var(--green);border:1px solid rgba(76,175,125,.3)}
.bdg-R{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(91,143,212,.3)}
.bdg-imp{background:rgba(224,82,82,.12);color:var(--red);border:1px solid rgba(224,82,82,.3);font-size:9px}
.bdg-dom{background:var(--bg4);color:var(--ink2);border:1px solid var(--border);font-size:10px}
.rc-right{display:flex;align-items:center;gap:6px}
.rc-date{font-size:11px;color:var(--ink3);white-space:nowrap}
.icon-btn{width:26px;height:26px;border-radius:6px;background:transparent;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;font-size:12px}
.icon-btn:hover{border-color:var(--border2);background:var(--bg4)}
.icon-btn.fav-btn.active,.icon-btn.fav-btn:hover{border-color:var(--gold);background:var(--gold-dim)}
.icon-btn.annot-btn:hover{border-color:var(--teal);background:var(--teal-dim)}
.rc-titre{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--ink);line-height:1.35;margin-bottom:.4rem}
.rc-titre-orig{font-size:11.5px;color:var(--ink3);margin-bottom:.35rem;line-height:1.4}
.rc-resume-toggle{font-size:11px;color:var(--gold);cursor:pointer;margin-top:.375rem;display:inline-flex;align-items:center;gap:4px;background:none;border:none;font-family:'Syne',sans-serif;font-weight:500;padding:0}
.rc-resume-toggle:hover{opacity:.75}
.rc-resume-wrap{display:none;margin-top:.625rem;padding:.75rem;background:var(--bg2);border-radius:8px;border-left:2px solid var(--gold)}
.rc-resume-wrap.open{display:block}
.rc-resume-text{font-size:13px;color:var(--ink2);line-height:1.65}
.rc-meta{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--ink3);margin-top:.375rem}
.rc-importance{margin-top:.5rem;padding:.375rem .625rem;background:rgba(224,82,82,.06);border:1px solid rgba(224,82,82,.15);border-radius:6px;font-size:11px;color:var(--ink3)}
.rc-footer{display:flex;align-items:center;justify-content:space-between;margin-top:.875rem;padding-top:.625rem;border-top:1px solid var(--border)}
.rc-path{font-size:11px;color:var(--ink3);display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.rc-link{font-size:12px;color:var(--gold);font-weight:500;text-decoration:none;transition:opacity .15s}
.rc-link:hover{opacity:.75}
.admin-edit-zone{margin-top:.75rem;padding:.75rem;background:rgba(155,114,207,.06);border:1px solid rgba(155,114,207,.2);border-radius:8px;display:none}
.admin-edit-zone.open{display:block}
.admin-edit-inp{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:7px;padding:7px 10px;font-family:'Syne',sans-serif;font-size:13px;color:var(--ink);outline:none;margin-bottom:.5rem}
.admin-edit-inp:focus{border-color:var(--purple)}
.admin-edit-actions{display:flex;gap:.5rem}
.btn-save-admin{padding:6px 14px;background:var(--purple);color:#fff;border:none;border-radius:6px;font-family:'Syne',sans-serif;font-size:12px;font-weight:600;cursor:pointer}
.btn-cancel-sm{padding:6px 12px;background:transparent;border:1px solid var(--border2);border-radius:6px;font-family:'Syne',sans-serif;font-size:12px;color:var(--ink3);cursor:pointer}

/* ANNOTATIONS */
.annot-panel{margin-top:.875rem;border-top:1px solid var(--border);padding-top:.875rem;display:none}
.annot-panel.open{display:block}
.annot-list{display:flex;flex-direction:column;gap:.5rem;margin-bottom:.75rem}
.annot-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:.625rem .875rem}
.annot-header{display:flex;align-items:center;gap:7px;margin-bottom:.25rem;flex-wrap:wrap}
.annot-avatar{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.annot-author{font-size:11px;font-weight:600;color:var(--ink2)}
.annot-time{font-size:10px;color:var(--ink3);margin-left:auto}
.annot-text{font-size:12.5px;color:var(--ink2);line-height:1.5}
.annot-del{font-size:10px;color:var(--ink3);cursor:pointer;background:none;border:none;font-family:'Syne',sans-serif;margin-top:.25rem;padding:0}
.annot-del:hover{color:var(--red)}
.tag-pill{font-size:10px;padding:1px 7px;border-radius:10px;font-weight:500}
.tag-info{background:var(--teal-dim);color:var(--teal);border:1px solid rgba(60,191,180,.3)}
.tag-important{background:var(--red-dim);color:var(--red);border:1px solid rgba(224,82,82,.3)}
.tag-question{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(91,143,212,.3)}
.tag-ok{background:var(--green-dim);color:var(--green);border:1px solid rgba(76,175,125,.3)}
.annot-form{display:flex;flex-direction:column;gap:.5rem}
.annot-form-meta{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}
.annot-inp{background:var(--bg2);border:1px solid var(--border2);border-radius:7px;padding:6px 10px;font-family:'Syne',sans-serif;font-size:12px;color:var(--ink);outline:none}
.annot-inp::placeholder{color:var(--ink3)}
.annot-textarea{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:.5rem .75rem;font-family:'Syne',sans-serif;font-size:12.5px;color:var(--ink);outline:none;resize:none;min-height:56px;line-height:1.5}
.annot-textarea::placeholder{color:var(--ink3)}
.btn-annot{padding:6px 14px;background:var(--teal);color:var(--bg);border:none;border-radius:7px;font-family:'Syne',sans-serif;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap}

/* TIMELINE */
.timeline{display:flex;flex-direction:column;position:relative;padding-left:2rem}
.timeline::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:1px;background:var(--border)}
.tl-year-group{margin-bottom:.5rem}
.tl-year{display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem;position:relative}
.tl-year-dot{width:13px;height:13px;border-radius:50%;background:var(--bg3);border:2px solid var(--gold);position:absolute;left:-2.45rem;top:1px}
.tl-year-label{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--gold)}
.tl-year-count{font-size:11px;color:var(--ink3);background:var(--bg3);border:1px solid var(--border);padding:1px 8px;border-radius:10px}
.tl-item{display:flex;gap:1rem;margin-bottom:.75rem;position:relative;align-items:flex-start}
.tl-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);flex-shrink:0;margin-top:5px;position:absolute;left:-2.35rem}
.tl-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:.875rem 1.125rem;flex:1;transition:all .2s;cursor:pointer}
.tl-card:hover{border-color:var(--border2);background:var(--bg4)}
.tl-card-top{display:flex;align-items:center;gap:6px;margin-bottom:.375rem;flex-wrap:wrap}
.tl-title{font-size:13px;font-weight:600;color:var(--ink);line-height:1.35;margin-bottom:.25rem}
.tl-meta{font-size:11px;color:var(--ink3);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tl-link{font-size:11px;color:var(--gold);text-decoration:none;margin-left:auto}
.tl-link:hover{opacity:.75}

/* NOUVEAUTÉS */
.nc{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:1.125rem 1.375rem;margin-bottom:10px;position:relative;overflow:hidden;transition:all .2s}
.nc:hover{border-color:var(--border2)}

// ══════════════════════════════════════════════════════════════════
// ALGORITHME DE SCORING — classe un arrêt dans le bon domaine
// Score basé sur : chambre (3pts) + articles mentionnés (2pts each) + thèmes (1pt each)
// ══════════════════════════════════════════════════════════════════
function scoreArret(item, domain) {
  let score = 0;
  const text = [
    ...(item.themes || []),
    item.summary || '',
    item.title || '',
    (item.titlesAndSummaries || []).map(t => [...(t.titles||[]), t.summary||''].join(' ')).join(' ')
  ].join(' ').toLowerCase();

  const chamber = (item.chamber || item.formation || '').toLowerCase();

  // Score chambre (3 points)
  for (const ch of domain.chambres) {
    if (chamber.includes(ch) || chamber.includes(ch.replace('civ','chambre civile').replace('com','commerciale').replace('soc','sociale').replace('crim','criminelle'))) {
      score += 3;
      break;
    }
  }

  // Score articles (2 points chacun)
  for (const art of domain.articles) {
    if (text.includes(art.toLowerCase())) score += 2;
  }

  // Score thèmes (1 point chacun)
  for (const theme of domain.themes) {
    if (text.includes(theme.toLowerCase())) score += 1;
  }

  return score;
}

function classifyArret(item) {
  let bestDomain = null;
  let bestScore = 0;
  for (const domain of DOMAINS) {
    const score = scoreArret(item, domain);
    if (score > bestScore) { bestScore = score; bestDomain = domain; }
  }
  return { domain: bestDomain, score: bestScore };
}

// Tri chronologique strict : du plus récent au plus ancien
function sortByDate(arr) {
  return [...arr].sort((a, b) => {
    const da = a.date ? new Date(a.date) : new Date(0);
    const db = b.date ? new Date(b.date) : new Date(0);
    return db - da; // décroissant = plus récent en premier
  });
}

async function api(method,path,body){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(session?.access_token)opts.headers['Authorization']=`Bearer ${session.access_token}`;
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(`${PROXY}${path}`,opts);
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error||`HTTP ${r.status}`);}
  return r.json();
}

// ══════════════════════════════════════════════════════════════════
// FETCH JUDILIBRE + CLASSEMENT PAR SCORING
// ══════════════════════════════════════════════════════════════════
async function fetchSubView(domId,subName,page){
  const d=DOMAINS.find(x=>x.id===domId);
  const s=d?.subs.find(x=>x.name===subName);if(!d||!s)return;
  const el=document.getElementById('subResults');if(!el)return;
  if(page===0)el.innerHTML='<div class="cstate"><div class="spinner"></div></div>';

  const chamber=d.chambres[0]||'';
  currentChamber=chamber;
  currentPage=page;

  try{
    const allRawResults=new Map();

    // Requête 1 : premier thème clé de la sous-catégorie (mot court et précis)
    const kw1=s.themes[0]||subName;
    const p1=new URLSearchParams({query:kw1,page_size:'25',page:String(page),resolve_references:'true',...(chamber&&{chamber})});
    const r1=await fetch(`${PROXY}/judilibre/search?${p1}`);
    const d1=await r1.json();
    if(d1.error)throw new Error(d1.error);
    currentTotal=d1.total||0;
    (d1.results||[]).forEach(item=>{if(item.id)allRawResults.set(item.id,item);});

    // Requête 2 : deuxième thème si moins de 10 résultats
    if(s.themes[1]&&allRawResults.size<10){
      const p2=new URLSearchParams({query:s.themes[1],page_size:'15',page:'0',resolve_references:'true',...(chamber&&{chamber})});
      const r2=await fetch(`${PROXY}/judilibre/search?${p2}`);
      const d2=await r2.json();
      (d2.results||[]).forEach(item=>{if(item.id&&!allRawResults.has(item.id))allRawResults.set(item.id,item);});
    }

    // Construire les objets résultat
    const newItems=[...allRawResults.values()].map(item=>{
      const pubArr=item.publication||[];
      const pubStr=pubArr.join(' ').toLowerCase();
      let pub='I';
      if(pubStr.includes('bulletin')&&pubStr.includes('publié'))pub='P';
      else if(pubStr.includes('bulletin'))pub='B';
      else if(pubStr.includes('rapport'))pub='R';
      const dateStr=item.decision_date||'';
      const year=dateStr?new Date(dateStr).getFullYear():null;
      // Titre : utiliser les titres officiels Judilibre (hiérarchie de thèmes)
      const titresOfficiels=(item.titlesAndSummaries||[]).flatMap(t=>t.titles||[]).filter(Boolean);
      const titre=titresOfficiels.slice(0,3).join(' — ')||item.title||item.summary?.slice(0,200)||'Arrêt';
      return{
        id:item.id,type:'juri',
        titre,titre_admin:null,resume:null,
        judilibre_summary:item.summary||'',
        judilibre_themes:item.themes||[],
        date:dateStr,year,
        formation:item.chamber||item.formation||'',
        numero:item.number||'',
        publication:pub,
        important:['P','B'].includes(pub),
        importanceReasons:pub==='P'?['Publié au Bulletin']:pub==='B'?["Bulletin d'information"]:[],
        lien:`https://www.courdecassation.fr/decision/${item.id}`,
        domain:d.name,sub:subName,theme:kw1
      };
    }).filter(a=>a.id&&['P','B','R'].includes(a.publication));

    const sorted=sortByDate(newItems);
    if(page===0)allResults=sorted;
    else allResults=sortByDate([...allResults,...sorted]);

    const statsRow=document.getElementById('statsRow');
    if(statsRow){
      statsRow.style.display='flex';
      document.getElementById('sTot').textContent=allResults.length;
      document.getElementById('sPub').textContent=allResults.filter(r=>r.publication==='P').length;
    }

    allResults.forEach(r=>saveBG(r));
    renderResults(el,page);
    allResults.filter(r=>!r.resume).slice(0,5).forEach(r=>loadSummaryBG(r));

  }catch(err){
    el.innerHTML=`<div class="cstate"><div class="cs-ico">⚠️</div><div class="cs-title" style="color:var(--red)">${err.message}</div></div>`;
  }
}

function renderResults(el,page){
  const filtered=getFiltered();
  if(!filtered.length&&page===0){
    el.innerHTML='<div class="cstate"><div class="cs-ico">📭</div><div class="cs-title">Aucun arrêt dans cette catégorie</div><div class="cs-text">Aucun arrêt publié ne correspond à ces critères pour le moment.</div></div>';
    return;
  }
  if(viewMode==='timeline'){renderTimeline(filtered,el);return;}
  const cardsHTML=filtered.map(r=>resultCardHTML(r)).join('');
  const hasMore=currentTotal>((currentPage+1)*25);
  const paginHTML=hasMore?`<div class="pagination-wrap"><button class="btn-load-more" onclick="loadMore()">Charger 25 suivants →</button><div class="pagination-info">${filtered.length} affichés sur ~${currentTotal} résultats</div></div>`:'';
  if(page===0){
    el.innerHTML=`<div class="results-list" id="resultsList">${cardsHTML}</div>${paginHTML}`;
  }else{
    const list=document.getElementById('resultsList');
    if(list)list.insertAdjacentHTML('beforeend',cardsHTML);
    el.querySelector('.pagination-wrap')?.remove();
    if(hasMore)el.insertAdjacentHTML('beforeend',paginHTML);
  }
}

function getFiltered(){

// TIMELINE
// ══════════════════════════════════════════════════════════════════
function renderTimeline(results,el){
  if(!results.length){el.innerHTML='<div class="cstate"><div class="cs-ico">📭</div><div class="cs-title">Aucun résultat</div></div>';return;}
  const byYear={};
  results.forEach(r=>{const y=r.year||'?';if(!byYear[y])byYear[y]=[];byYear[y].push(r);});
  let html='<div class="timeline">';
  Object.keys(byYear).sort((a,b)=>b-a).forEach(year=>{
    const items=byYear[year];
    // Trier les items de l'année du plus récent au plus ancien
    const sortedItems=sortByDate(items);
    html+=`<div class="tl-year-group"><div class="tl-year"><div class="tl-year-dot"></div><span class="tl-year-label">${year}</span><span class="tl-year-count">${items.length} arrêt${items.length>1?'s':''}</span></div>`;
    sortedItems.forEach(r=>{
      const date=r.date?new Date(r.date).toLocaleDateString('fr-FR',{day:'numeric',month:'long'}):'';
      const titre=r.titre_admin&&r.titre_admin!==r.titre?r.titre_admin:r.titre;
      html+=`<div class="tl-item"><div class="tl-dot"></div>
        <div class="tl-card" onclick="window.open('${r.lien}','_blank')">
          <div class="tl-card-top">
            <span class="badge bdg-${r.publication}">${r.publication}</span>
            ${r.important?`<span class="badge bdg-imp">⚡</span>`:''}
            <a class="tl-link" href="${r.lien}" target="_blank" onclick="event.stopPropagation()">Cour de cassation →</a>
          </div>
          <div class="tl-title">${titre}</div>
          <div class="tl-meta"><span>${date}</span>${r.formation?`<span>${r.formation}</span>`:''}${r.numero?`<span>N° ${r.numero}</span>`:''}</div>
        </div>
      </div>`;
    });
    html+=`</div>`;
  });
  html+='</div>';el.innerHTML=html;
}

// NOUVEAUTÉS — triées du plus récent au plus ancien
// ══════════════════════════════════════════════════════════════════
async function renderNouveautes(){
  const m=document.getElementById('MA');
  m.innerHTML=`<div class="hero"><div><h1 class="hero-title">🆕 Nouveautés</h1><p class="hero-sub">Derniers arrêts ajoutés — du plus récent au plus ancien</p></div></div><div class="cstate"><div class="spinner"></div></div>`;
  try{
    const data=await api('GET','/nouveautes?limit=100');
    if(!data.length){
      m.innerHTML=`<div class="hero"><div><h1 class="hero-title">🆕 Nouveautés</h1></div></div><div class="cstate"><div class="cs-ico">📭</div><div class="cs-title">Aucune nouveauté</div><div class="cs-text">Les arrêts apparaîtront ici au fur et à mesure des recherches.</div></div>`;
      return;
    }
    // Trier par date de décision (plus récent d'abord)
    const sorted=data
      .filter(n=>n.arrets)
      .sort((a,b)=>{
        const da=a.arrets?.date_decision?new Date(a.arrets.date_decision):new Date(0);
        const db=b.arrets?.date_decision?new Date(b.arrets.date_decision):new Date(0);
        return db-da;
      });
    const cards=sorted.map(n=>{
      const a=n.arrets;if(!a)return'';
      const date=a.date_decision?new Date(a.date_decision).toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'}):'';
      const addedDate=new Date(n.added_at).toLocaleDateString('fr-FR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
      const titre=a.titre_admin&&a.titre_admin!==a.titre_original?a.titre_admin:a.titre_original||'Arrêt';
      const pathHTML=[a.domaine,a.sous_categorie].filter(Boolean).map((p,i)=>i===0?`<span class="nc-path-item">${p}</span>`:`<span class="nc-path-sep">›</span><span class="nc-path-item">${p}</span>`).join('');
      const keywords=extractKeywords(titre,a.theme);
      return`<div class="nc">
        <div class="rc-badges" style="margin-bottom:.5rem">
          <span class="badge bdg-${a.publication||'P'}">${a.publication||'P'}</span>
          ${a.important?`<span class="badge bdg-imp">⚡ Important</span>`:''}
        </div>
        <div class="nc-titre">${titre}</div>
        ${a.titre_admin&&a.titre_admin!==a.titre_original?`<div class="nc-titre-orig">${a.titre_original}</div>`:''}
        ${pathHTML?`<div class="nc-path">${pathHTML}</div>`:''}
        ${keywords.length?`<div class="nc-keywords">${keywords.map(k=>`<span class="nc-keyword">${k}</span>`).join('')}</div>`:''}
        <div class="nc-meta">
          ${date?`<span>📅 ${date}</span>`:''}
          ${a.formation?`<span>${a.formation}</span>`:''}
          <span class="nc-added">Ajouté le ${addedDate}</span>
          <a class="rc-link" href="${a.lien||'#'}" target="_blank">Cour de cassation →</a>
        </div>
        ${a.resume?`<button class="nc-resume-toggle" onclick="toggleNcResume(this)">▸ Voir l'analyse</button><div class="nc-resume-wrap">${a.resume}</div>`:''}
      </div>`;
    }).join('');
    m.innerHTML=`<div class="hero"><div><h1 class="hero-title">🆕 Nouveautés</h1><p class="hero-sub">${sorted.length} arrêt${sorted.length>1?'s':''} · triés du plus récent au plus ancien</p></div></div>${cards}`;
  }catch(e){m.innerHTML=`<div class="cstate"><div class="cs-ico">⚠️</div><div class="cs-title" style="color:var(--red)">${e.message}</div></div>`;}
}

function extractKeywords(titre,theme){
  const kws=new Set();
  if(theme)kws.add(theme);
  const m=(titre||'').match(/\b(licenciement|bail|contrat|responsabilité|prescription|nullité|résiliation|indemnité|faute|préjudice|cession|dissolution|cautionnement|hypothèque|marque|brevet|harcèlement|inaptitude|servitude|usufruit|indivision)\b/gi);
  if(m)m.slice(0,3).forEach(w=>kws.add(w.toLowerCase()));
  return[...kws].slice(0,4);
}
function toggleNcResume(btn){
  const wrap=btn.nextElementSibling;
  wrap.classList.toggle('open');
  btn.textContent=wrap.classList.contains('open')?'▾ Masquer':'▸ Voir l\'analyse';
}

  }catch(e){m.querySelector('.cstate').innerHTML=`<div class="cs-title" style="color:var(--red)">${e.message}</div>`;}
}

// ══════════════════════════════════════════════════════════════════
// ESPACE COLLABORATIF
// ══════════════════════════════════════════════════════════════════
async function renderCollab(){
  const m=document.getElementById('MA');
  m.innerHTML=`
    <div class="hero">
      <div><h1 class="hero-title">👥 Espace équipe</h1><p class="hero-sub">Veilles partagées · Annotations · Accès par lien</p></div>
      <button class="btn-top" style="background:var(--bg3);color:var(--teal);border:1px solid rgba(60,191,180,.35)" onclick="toggleNewVeilleForm()">+ Nouvelle veille</button>
    </div>
    <div id="newVeilleFormWrap"></div>
    <div class="section-title">Veilles d'équipe</div>
    <div id="veillesWrap"><div class="cstate" style="padding:2rem"><div class="spinner"></div></div></div>`;
  try{
    const veilles=await api('GET','/veilles');
    const wrap=document.getElementById('veillesWrap');
    if(!veilles.length){wrap.innerHTML=`<div class="cstate" style="padding:2rem"><div class="cs-ico">📋</div><div class="cs-title">Aucune veille partagée</div><div class="cs-text">Créez une veille thématique et partagez-la avec votre équipe.</div></div>`;return;}
    wrap.innerHTML=`<div class="collab-grid">${veilles.map(v=>`
      <div class="veille-card">
        <div class="vc-title">${v.title}</div>
        <div class="vc-meta">📅 Créée le ${new Date(v.created_at).toLocaleDateString('fr-FR')}</div>
        <div class="vc-tags">${(v.domains||[]).map(d=>`<span class="vc-tag">${d}</span>`).join('')}${(v.keywords||[]).map(k=>`<span class="vc-tag" style="color:var(--teal);border-color:rgba(60,191,180,.3)">${k}</span>`).join('')}</div>
        <div class="vc-footer">
          <div></div>
          <div class="vc-actions">
            <button class="vc-btn vc-btn-share" onclick="toggleSharePanel('${v.id}')">🔗 Partager</button>
            <button class="vc-btn vc-btn-del" onclick="deleteVeille('${v.id}')">✕</button>
          </div>
        </div>
        <div class="share-panel" id="sp-${v.id}">
          <div style="font-size:11px;font-weight:600;color:var(--teal)">Lien de partage</div>
          <div class="share-url-row"><input class="share-url" readonly id="su-${v.id}" value="${location.href.split('?')[0]}?veille=${v.id}"/><button class="btn-copy" onclick="copyUrl('${v.id}')">Copier</button></div>
        </div>
      </div>`).join('')}</div>`;
  }catch(e){document.getElementById('veillesWrap').innerHTML=`<div class="cstate"><div class="cs-title" style="color:var(--red)">${e.message}</div></div>`;}
}

function toggleSharePanel(id){document.getElementById(`sp-${id}`)?.classList.toggle('open');}
function copyUrl(id){const el=document.getElementById(`su-${id}`);navigator.clipboard?.writeText(el.value).catch(()=>{el.select();document.execCommand('copy');});showToast('📋','Lien copié !');}
function toggleNewVeilleForm(){
  const wrap=document.getElementById('newVeilleFormWrap');
  if(wrap.innerHTML){wrap.innerHTML='';return;}
  wrap.innerHTML=`<div class="new-veille-form">
    <div style="font-size:13px;font-weight:600;color:var(--ink);margin-bottom:.875rem">Créer une veille d'équipe</div>
    <div class="nv-grid"><input class="nv-inp" id="nvTitle" placeholder="Nom de la veille"/><input class="nv-inp" id="nvKW" placeholder="Mots-clés (virgules)"/></div>
    <select class="nv-sel" id="nvDomains" multiple size="4" style="border-radius:var(--r);padding:.5rem;margin-bottom:.75rem">${DOMAINS.map(d=>`<option value="${d.name}">${d.icon} ${d.name}</option>`).join('')}</select>
    <p style="font-size:11px;color:var(--ink3);margin-bottom:.75rem">Ctrl/Cmd pour plusieurs domaines</p>
    <div class="nv-actions"><button class="btn-cancel-sm" onclick="document.getElementById('newVeilleFormWrap').innerHTML=''">Annuler</button><button class="btn-create" onclick="createVeille()">Créer</button></div>
  </div>`;
}
async function createVeille(){
  const title=document.getElementById('nvTitle').value.trim();
  const kw=document.getElementById('nvKW').value.split(',').map(k=>k.trim()).filter(Boolean);
  const domains=Array.from(document.getElementById('nvDomains').selectedOptions).map(o=>o.value);
  if(!title){showToast('⚠️','Donnez un nom à la veille');return;}
  try{await api('POST','/veilles',{title,keywords:kw,domains});document.getElementById('newVeilleFormWrap').innerHTML='';showToast('✓',`Veille "${title}" créée`);renderCollab();}
  catch(e){showToast('⚠️',e.message);}
}
async function deleteVeille(id){try{await api('DELETE',`/veilles/${id}`);showToast('✓','Veille supprimée');renderCollab();}catch(e){showToast('⚠️',e.message);}}

// ══════════════════════════════════════════════════════════════════
// ANNOTATIONS
// ══════════════════════════════════════════════════════════════════
function toggleAnnotPanel(resultId){
  if(!currentUser){openAuth();return;}
  const panel=document.getElementById(`ap-${resultId}`);if(!panel)return;
  const isOpen=panel.classList.contains('open');
  panel.classList.toggle('open',!isOpen);
  if(!isOpen)loadAnnotPanel(resultId);
}
async function loadAnnotPanel(resultId){
  const panel=document.getElementById(`ap-${resultId}`);if(!panel)return;
  panel.innerHTML='<div style="text-align:center;padding:.5rem"><div class="spinner" style="margin:0 auto;width:20px;height:20px"></div></div>';
  try{const annots=await api('GET',`/annotations/${resultId}`);renderAnnotPanel(resultId,annots);}
  catch(e){panel.innerHTML=`<div style="font-size:12px;color:var(--red)">${e.message}</div>`;}
}
function renderAnnotPanel(resultId,annots){
  const panel=document.getElementById(`ap-${resultId}`);if(!panel)return;
  const tagCls={info:'tag-info',important:'tag-important',question:'tag-question',ok:'tag-ok'};
  const tagLbl={info:'💬 Note',important:'⚡ Important',question:'❓ Question',ok:'✓ Validé'};
  const list=annots.length
    ?annots.map(a=>{const date=new Date(a.created_at).toLocaleDateString('fr-FR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});return`<div class="annot-item"><div class="annot-header"><div class="annot-avatar" style="background:#1A2340;color:#5B8FD4">${(a.author_name||'?').slice(0,2).toUpperCase()}</div><span class="annot-author">${a.author_name||'Anonyme'}</span><span class="tag-pill ${tagCls[a.tag]||'tag-info'}">${tagLbl[a.tag]||a.tag}</span><span class="annot-time">${date}</span></div><div class="annot-text">${a.content}</div><button class="annot-del" onclick="deleteAnnot('${a.id}','${resultId}')">Supprimer</button></div>`;}).join('')
    :'<div style="font-size:12px;color:var(--ink3);text-align:center;padding:.375rem">Soyez le premier à annoter.</div>';
  panel.innerHTML=`<div class="annot-list">${list}</div>
    <div class="annot-form">
      <div class="annot-form-meta">
        <input class="annot-inp" id="an-name-${resultId}" placeholder="Votre prénom" style="width:130px" value="${currentUser?.email?.split('@')[0]||''}"/>
        <select class="annot-inp" id="an-tag-${resultId}" style="width:130px"><option value="info">💬 Note</option><option value="important">⚡ Important</option><option value="question">❓ Question</option><option value="ok">✓ Validé</option></select>
      </div>
      <div style="display:flex;gap:.5rem;align-items:flex-end">
        <textarea class="annot-textarea" id="an-text-${resultId}" placeholder="Votre annotation…" rows="2"></textarea>
        <button class="btn-annot" onclick="submitAnnot('${resultId}')">Publier</button>
      </div>
    </div>`;
}
async function submitAnnot(resultId){
  const text=document.getElementById(`an-text-${resultId}`)?.value.trim();
  const name=document.getElementById(`an-name-${resultId}`)?.value.trim()||'Anonyme';
  const tag=document.getElementById(`an-tag-${resultId}`)?.value||'info';
  if(!text){showToast('⚠️','Écrivez votre annotation');return;}
  try{await api('POST','/annotations',{arretId:resultId,content:text,tag,authorName:name,authorRole:'',colorIdx:2});const annots=await api('GET',`/annotations/${resultId}`);renderAnnotPanel(resultId,annots);showToast('💬','Annotation publiée');}
  catch(e){showToast('⚠️',e.message);}
}
async function deleteAnnot(annotId,resultId){
  try{await api('DELETE',`/annotations/${annotId}`);const annots=await api('GET',`/annotations/${resultId}`);renderAnnotPanel(resultId,annots);showToast('✓','Annotation supprimée');}
  catch(e){showToast('⚠️',e.message);}
}

// ══════════════════════════════════════════════════════════════════
// SAUVEGARDE + RÉSUMÉS MISTRAL
// ══════════════════════════════════════════════════════════════════
async function saveBG(r){
  try{await fetch(`${PROXY}/arrets/save`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({arret:r})});}catch(e){}
}
async function loadSummaryBG(result){
  try{
    const r=await fetch(`${PROXY}/summarize`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:result.id,titre:result.titre,type:'juri',formation:result.formation,date:result.date,numero:result.numero,judilibre_summary:result.judilibre_summary||''})});
    const data=await r.json();
    if(!data.titre_admin&&!data.resume)return;
    const idx=allResults.findIndex(x=>x.id===result.id);
    if(idx>=0){if(data.titre_admin)allResults[idx].titre_admin=data.titre_admin;if(data.resume)allResults[idx].resume=data.resume;}
    const card=document.getElementById(`rc-${result.id}`);if(!card)return;
    if(data.titre_admin){const el=card.querySelector('.rc-titre');if(el)el.textContent=data.titre_admin;}
    if(data.resume){const rtxt=card.querySelector('.rc-resume-text');const rtog=card.querySelector('.rc-resume-toggle');if(rtxt){rtxt.textContent=data.resume;if(rtog)rtog.style.display='';}}
  }catch(e){}
}

// ══════════════════════════════════════════════════════════════════
// ADMIN
// ══════════════════════════════════════════════════════════════════
async function renderAdmin(){
  const m=document.getElementById('MA');
  m.innerHTML=`
    <div class="hero"><div><h1 class="hero-title">⚙ Panneau administrateur</h1></div></div>
    <div class="admin-section">
      <div class="admin-section-title">🔑 API Légifrance / Judilibre</div>
      <div class="admin-grid">
        <div><label class="admin-lbl">Client ID</label><input class="admin-inp" id="adCId" value="${creds.id||''}"/></div>
        <div><label class="admin-lbl">Client Secret</label><input class="admin-inp" type="password" id="adCSec" value="${creds.secret||''}"/></div>
      </div>
      <div id="adCredSt" class="admin-status"></div>
      <button class="btn-admin-save" onclick="adminSaveCreds()" style="margin-top:.75rem">Enregistrer & tester</button>
    </div>
    <div class="admin-section">
      <div class="admin-section-title">🔧 Rôle administrateur</div>
      <p style="font-size:12px;color:var(--ink3);margin-bottom:.75rem">Si votre compte n'a pas le rôle admin après connexion.</p>
      <div id="bootstrapSt" class="admin-status"></div>
      <button class="btn-admin-save" style="background:var(--purple)" onclick="bootstrapAdmin()">Activer le rôle admin</button>
    </div>
    <div class="admin-section">
      <div class="admin-section-title">✏️ Modifier les titres des arrêts récents</div>
      <div id="adminArretsList"><div class="cstate" style="padding:1rem"><div class="spinner"></div></div></div>
    </div>`;
  loadAdminArrets();
}
async function adminSaveCreds(){
  const id=document.getElementById('adCId').value.trim();const sec=document.getElementById('adCSec').value.trim();const st=document.getElementById('adCredSt');
  if(!id||!sec){st.textContent='Remplissez les deux champs.';st.style.color='var(--red)';return;}
  st.textContent='Test en cours…';st.style.color='var(--ink3)';
  try{await api('POST','/admin/set-creds',{clientId:id,clientSecret:sec});creds={id,secret:sec};localStorage.setItem('lt_creds',JSON.stringify(creds));connected=true;st.textContent='✓ API connectée — veille automatique active.';st.style.color='var(--green)';showToast('✓','API connectée');}
  catch(err){st.textContent='✗ '+err.message;st.style.color='var(--red)';}
}
async function bootstrapAdmin(){
  const st=document.getElementById('bootstrapSt');st.textContent='En cours…';
  try{const r=await fetch(`${PROXY}/admin/bootstrap`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({secret:'legaltrack-bootstrap-2025'})});const data=await r.json();if(!r.ok)throw new Error(data.error||'Erreur');st.textContent='✓ '+data.message+' — Reconnectez-vous.';st.style.color='var(--green)';showToast('✓','Rôle admin activé');}
  catch(e){st.textContent='✗ '+e.message;st.style.color='var(--red)';}
}
async function loadAdminArrets(){
  const el=document.getElementById('adminArretsList');
  try{
    const data=await api('GET','/nouveautes?limit=30');
    if(!data.length){el.innerHTML='<div style="font-size:13px;color:var(--ink3);padding:.5rem">Aucun arrêt en base.</div>';return;}
    // Trier par date décroissante
    const sorted=data.filter(n=>n.arrets).sort((a,b)=>{const da=a.arrets?.date_decision?new Date(a.arrets.date_decision):new Date(0);const db=b.arrets?.date_decision?new Date(b.arrets.date_decision):new Date(0);return db-da;});
    el.innerHTML=sorted.map(n=>{const a=n.arrets;if(!a)return'';const date=a.date_decision?new Date(a.date_decision).toLocaleDateString('fr-FR'):'';return`<div class="admin-arret-row"><div style="font-size:11px;color:var(--ink3);margin-bottom:.375rem">${a.domaine||''} › ${a.sous_categorie||''} · ${date}</div><div style="font-size:12px;color:var(--ink3);margin-bottom:.375rem">${a.titre_original||''}</div>${a.titre_admin&&a.titre_admin!==a.titre_original?`<div style="font-size:12px;color:var(--teal);margin-bottom:.375rem;font-weight:500">✓ ${a.titre_admin}</div>`:''}<div style="display:flex;gap:.5rem"><input class="admin-inp" id="at-${a.id}" value="${(a.titre_admin||'').replace(/"/g,'&quot;')}" placeholder="Titre juridique…" style="flex:1;font-size:12px;padding:6px 10px"/><button class="btn-admin-save" style="font-size:12px;padding:6px 14px" onclick="adminSaveTitre('${a.id}','at-${a.id}')">Sauvegarder</button></div></div>`;}).join('');
  }catch(e){el.innerHTML=`<div style="font-size:13px;color:var(--red)">${e.message}</div>`;}
}
async function adminSaveTitre(id,inputId){
  const titre=document.getElementById(inputId)?.value.trim();if(!titre)return;
  try{await api('POST','/arrets/update-titre',{id,titre_admin:titre});showToast('✓','Titre mis à jour');}
  catch(e){showToast('⚠️',e.message);}
}

// ══════════════════════════════════════════════════════════════════
// RECHERCHE
// ══════════════════════════════════════════════════════════════════
function handleSearch(q){
  if(!q.trim()||!allResults.length)return;
  const q2=q.toLowerCase();
  const filtered=allResults.filter(r=>(r.titre||'').toLowerCase().includes(q2)||(r.titre_admin||'').toLowerCase().includes(q2)||(r.numero||'').toLowerCase().includes(q2));
  const el=document.getElementById('subResults');
  if(el)el.innerHTML=`<div class="results-list">${sortByDate(filtered).map(r=>resultCardHTML(r)).join('')}</div>`;
}

// ══════════════════════════════════════════════════════════════════
// MODALS + TOAST
// ══════════════════════════════════════════════════════════════════
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function closeBg(e,id){if(e.target===document.getElementById(id))closeModal(id);}
function showToast(ico,msg){
  const t=document.getElementById('toast');
  document.getElementById('toastIco').textContent=ico;document.getElementById('toastMsg').textContent=msg;
  t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2800);
}

// ══════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════
(function init(){
  const saved=localStorage.getItem('lt_session');
  if(saved){try{const p=JSON.parse(saved);session=p.session;currentUser=p.user;}catch(e){}}
  const savedCreds=localStorage.getItem('lt_creds');
  if(savedCreds){try{const c=JSON.parse(savedCreds);creds=c;if(c.id&&c.secret)connected=true;}catch(e){}}
  updateTopbar();buildSB();renderHome();
  if(currentUser){loadFavIds();loadAlertes();}
  // Lien veille partagée
  const params=new URLSearchParams(location.search);
  const veilleId=params.get('veille');
  if(veilleId&&currentUser){setTimeout(async()=>{try{await api('POST',`/veilles/${veilleId}/join`);showCollab();showToast('👥','Veille rejointe !');}catch(e){}},500);}
})();
</script>
